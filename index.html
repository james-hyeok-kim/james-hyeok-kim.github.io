<!DOCTYPE html>
<html lang="ko">

    <head>
    
        <link rel="stylesheet" href="Style_Start_point.css">

    </head>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    
    <style>
        .img{
            color :white;
            font-size = 20px;
            margin :0 auto;
            position : absolute;
            left : 17%;
            top : 7%;
            margin-left : -170px;
            margin-top : -150px;
            
        }
        .btn{
            width : 650px;
            height : 115px;
            text-align:center;
            text-decoration: none;
            font-size:5rem;
            color : white;
            padding : 7px 20px 10px 20px;
            margin:20px;
            
            display : inline-flex; justify-content: center; align-items: center;
            vertical-align: middle; 
            border-radius:20px;
            transition : all 0.2s;
            text-shadow : 1px 4px rgba(0, 0, 0, 0.22);
            font-family: 'Luckiest Guy', cursive;
            position :absolute;
            left : 29%;
            margin-left : -125px;
            top : 79%;
            margin-top : 0px;
        }
        .btn:active{
            transform : translateY(4px);
        }
        .btn.start{
            background-color : #56595d;
            border-bottom:5px solid #7b7f84;
        }
        .btn.start:active{
            border-bottom:2px solid #7b7f84;
        }
        .btn.start:hover{
            background-color:#828b8b;
            cursor : pointer;
            box-shadow : 0 2px 4px rgba(67, 82, 116, 0.6);
        }
        
    </style>
    
    <body>
